/* ── Export ── */
function stripInSuffix(w) {
  const s = String(w||'').trim();
  return s.toLowerCase().endsWith('in') ? s.slice(0,-2) : s;
}
function ensureInSuffix(w) {
  const s = String(w||'').trim();
  if (!s) return '';
  return (s.toLowerCase().endsWith('in') ? s.slice(0,-2) : s) + 'in';
}
function formatExportDate(ts) {
  const d = new Date(ts);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;
}

function buildExportRow(bucket) {
  const h = bucket.header || {};
  const els = bucket.elements || [];
  const greenSec = els.filter(e=>e.tier==='green').reduce((s,e)=>s+e.durationSec,0);
  const amberSec = els.filter(e=>e.tier==='amber').reduce((s,e)=>s+e.durationSec,0);
  const cycleSec = greenSec + amberSec;
  const cycleMin = cycleSec > 0 ? +(cycleSec/60).toFixed(4) : null;
  const vaMin    = cycleSec > 0 ? +(greenSec/60).toFixed(4) : null;
  const nnvaMin  = cycleSec > 0 ? +(amberSec/60).toFixed(4) : null;
  const preheatSec    = els.filter(e=>e.name==='Preheat Time').reduce((s,e)=>s+e.durationSec,0);
  const posBucketEls  = els.filter(e=>e.name==='Positioning Bucket');
  const posBucketSec  = posBucketEls.reduce((s,e)=>s+e.durationSec,0);
  const numTeeth = h.numTeeth ? Number(h.numTeeth) : 0;
  return {
    date:        formatExportDate(bucket.startTs),
    frameNum:    h.frameNumber || '',
    fwP2:        ensureInSuffix(h.frameWidth),
    fwRaw:       stripInSuffix(h.frameWidth),
    operator:    h.operator    || '',
    toothType:   h.toothType   || '',
    numTeeth:    numTeeth || '',
    earType:     h.earType     || '',
    numObs:      Number(h.numObservations) || 1,
    notes:       [...els.filter(e=>e.note && e.name !== PAUSE_ELEMENT_NAME).map(e=>`${e.name}: ${e.note}`), h.notes || ''].filter(Boolean).join('\n'),
    cycleMin:    cycleMin,
    vaMin,
    nnvaMin,
    vaPct:       cycleMin > 0 ? +(vaMin/cycleMin).toFixed(6) : null,
    nnvaPct:     cycleMin > 0 ? +(nnvaMin/cycleMin).toFixed(6) : null,
    preheatMin:  preheatSec > 0 ? +(preheatSec/60).toFixed(4) : null,
    posBucketMin:posBucketSec > 0 ? +(posBucketSec/60).toFixed(4) : null,
    posCount:    posBucketEls.length || null,
    timePTooth:  (numTeeth > 0 && cycleMin > 0) ? +(cycleMin/numTeeth).toFixed(4) : null,
  };
}

function getColumnsForProcess(processName, plant, stream) {
  const isP1 = plant === 'Plant 1';
  const isQH = stream === 'Quick Hitch';
  const c = (h, fn) => [h, fn];
  const D=r=>r.date, FN=r=>r.frameNum, FW2=r=>r.fwP2, FWR=r=>r.fwRaw,
        OP=r=>r.operator, CY=r=>r.cycleMin, VA=r=>r.vaMin, NV=r=>r.nnvaMin,
        VP=r=>r.vaPct, NP=r=>r.nnvaPct, OB=r=>r.numObs, NO=r=>r.notes,
        PH=r=>r.preheatMin, PB=r=>r.posBucketMin, PC=r=>r.posCount,
        TT=r=>r.toothType, NT=r=>r.numTeeth, TPT=r=>r.timePTooth, ET=r=>r.earType;

  if (isP1) {
    // Plant 1 (Large Bucket) — Frame Width stored as plain number in workbook; strip any "in" suffix
    const base = [c('Date',D),c('Frame #',FN),c('Frame Width',FWR),c('Operator',OP)];
    const pp   = [c('Preheat Time (min)',PH),c('Positioning Bucket (min)',PB),c('# Times Positioned',PC)];
    const tail = [c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    if (processName === 'Teeth and Logo')
      return [...base,c('Tooth Type',TT),c('# of Teeth',NT),...pp,c('Cycle Time (min)',CY),c('Time per Tooth (min)',TPT),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    if (processName === 'Ears')
      return [...base,c('Ear Type',ET),...pp,...tail];
    return [...base,...pp,...tail];
  }

  if (isQH) {
    // Quick Hitch — all sheets use "Frame Width (in)" header + has # of Observations
    // Ear & Bushing Install: header is "Frame Width (in)" but data values are raw numbers (no "in")
    switch (processName) {
      case 'Bucket Roll':
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
      case 'Manual Shell Weld':
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
      case 'Teeth And Logo':
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FW2),c('Tooth Type',TT),c('Operator',OP),c('# of Teeth',NT),c('Cycle Time (min)',CY),c('Time per Tooth (min)',TPT),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
      case 'Teeth Weld':
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
      case 'Ear & Bushing Install':
        // Column header says "Frame Width (in)" but actual cell values are raw numbers like "12", "24"
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FWR),c('Ear Type',ET),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
      default:
        return [c('Date',D),c('Frame #',FN),c('Frame Width (in)',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('# of Observations',OB),c('Notes',NO)];
    }
  }

  // Pin On — mixed: some sheets have "in" data, some raw; no # of Observations
  switch (processName) {
    case 'Bucket Roll':
      return [c('Date',D),c('Frame #',FN),c('Frame Width',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    case 'Manual Shell Weld':
      return [c('Date',D),c('Frame #',FN),c('Width (in)',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    case 'Teeth Install':
      // Frame Width data is raw numbers ("24", "12") — use FWR
      return [c('Date',D),c('Frame Size',FN),c('Frame Width',FWR),c('Tooth Type',TT),c('Operator',OP),c('Number of Teeth',NT),c('Cycle Time (min)',CY),c('Time per Tooth (min)',TPT),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    case 'Ear and Bushing Install':
      // Frame Width data is raw numbers ("18", "12") — use FWR
      return [c('Date',D),c('Frame #',FN),c('Width (in)',FWR),c('Ear Type',ET),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    case 'Final Weld':
      return [c('Date',D),c('Frame Size',FN),c('Frame Width',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
    default:
      return [c('Date',D),c('Frame #',FN),c('Frame Width',FW2),c('Operator',OP),c('Cycle Time (min)',CY),c('VA Time (min)',VA),c('NNVA Time (min)',NV),c('VA %',VP),c('NNVA %',NP),c('Notes',NO)];
  }
}

function autoFitColumns(ws, aoa) {
  ws['!cols'] = aoa[0].map((_, ci) => ({
    wch: Math.min(45, Math.max(10, ...aoa.map(row => String(row[ci] ?? '').length)))
  }));
}

function boldAllCells(ws) {
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) continue;
      ws[addr].s = ws[addr].s || {};
      ws[addr].s.font = { bold: true };
    }
  }
}


function styleProcessSheet(ws, cols, numDataRows, plant) {
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  // Bold+centered header, centered data rows
  for (let R = range.s.r; R <= range.e.r; R++) {
    const isHeader = R === 0;
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) continue;
      ws[addr].s = {
        font: { bold: isHeader },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: isHeader },
      };
    }
  }
  // Apply % number format to VA% and NNVA% data cells for ALL plants so that
  // pasting into the workbook carries the correct format (not raw decimals).
  const _headers = cols.map(c => c[0]);
  const _vpIdx   = _headers.indexOf('VA %');
  const _nvpIdx  = _headers.indexOf('NNVA %');
  if (_vpIdx >= 0 && _nvpIdx >= 0) {
    for (let i = 0; i < numDataRows; i++) {
      [_vpIdx, _nvpIdx].forEach(ci => {
        const addr = XLSX.utils.encode_cell({ r: i + 1, c: ci });
        if (ws[addr]) ws[addr].z = '0.00%';
      });
    }
  }
  // Plant 1: write VA% and NNVA% as Excel formulas so pasting into the workbook
  // doesn't hardcode values that then stick around if elements are later deleted.
  if (plant !== 'Plant 1') return;
  const headers  = cols.map(c => c[0]);
  const cycleIdx = headers.indexOf('Cycle Time (min)');
  const vaIdx    = headers.indexOf('VA Time (min)');
  const nnvaIdx  = headers.indexOf('NNVA Time (min)');
  const vpIdx    = headers.indexOf('VA %');
  const nvpIdx   = headers.indexOf('NNVA %');
  if (cycleIdx < 0 || vaIdx < 0 || nnvaIdx < 0 || vpIdx < 0 || nvpIdx < 0) return;
  for (let i = 0; i < numDataRows; i++) {
    const er      = i + 2; // Excel row (1-indexed; row 1 = header)
    const cRef    = XLSX.utils.encode_col(cycleIdx) + er;
    const vaRef   = XLSX.utils.encode_col(vaIdx)    + er;
    const nnvaRef = XLSX.utils.encode_col(nnvaIdx)  + er;
    const style   = { font: { bold: false }, alignment: { horizontal: 'center', vertical: 'center' } };
    ws[XLSX.utils.encode_cell({ r: i+1, c: vpIdx })]  = { t: 'f', f: `IF(${cRef}=0,"",${vaRef}/${cRef})`,    z: '0.00%', s: style };
    ws[XLSX.utils.encode_cell({ r: i+1, c: nvpIdx })] = { t: 'f', f: `IF(${cRef}=0,"",${nnvaRef}/${cRef})`, z: '0.00%', s: style };
  }
}

// Returns array of buckets that were actually written to the file, or null on failure.
function runExportBuckets(buckets) {
  if (typeof XLSX === 'undefined') { alert('Export library not loaded. Connect to internet once to cache it, then retry.'); return null; }
  if (!buckets || !buckets.length) { alert('No buckets to export.'); return null; }

  // Group by (plant + stream + process) — each bucket carries its OWN plant/stream
  // stamped at creation time, so re-exporting old history after a plant switch
  // always uses the correct column schema instead of whatever plant is selected now.
  const byGroup = {};
  const noProcess = [];
  const exported = [];
  buckets.forEach(b => {
    const p = b.header && b.header.process;
    if (!p) { noProcess.push(b); return; }
    const plant  = b.plant  || state.plant;
    const stream = b.stream || state.stream;
    const key = `${plant}||${stream}||${p}`;
    (byGroup[key] = byGroup[key] || { plant, stream, process: p, buckets: [] }).buckets.push(b);
    exported.push(b);
  });

  const processCounts = {};
  Object.values(byGroup).forEach(g => { processCounts[g.process] = (processCounts[g.process]||0) + 1; });

  const wb = XLSX.utils.book_new();
  let sheetCount = 0;
  const plantTagsUsed = new Set();
  Object.values(byGroup).forEach(g => {
    const plantTag = g.plant === 'Plant 2' ? `P2_${(g.stream||'').replace(/ /g,'')}` : 'P1';
    plantTagsUsed.add(plantTag);
    const cols = getColumnsForProcess(g.process, g.plant, g.stream);
    const rows = g.buckets.map(b => buildExportRow(b));
    const aoa  = [cols.map(c=>c[0]), ...rows.map(r=>cols.map(c=>c[1](r)))];
    const ws   = XLSX.utils.aoa_to_sheet(aoa);
    autoFitColumns(ws, aoa);
    styleProcessSheet(ws, cols, rows.length, g.plant);
    let sheetName = g.process;
    if (processCounts[g.process] > 1) sheetName = `${g.process} (${plantTag})`;
    XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0,31));
    sheetCount++;
  });

  if (sheetCount === 0) {
    alert(`${noProcess.length} bucket${noProcess.length!==1?'s have':' has'} no process selected. Open the DETAILS panel and pick a process before exporting.`);
    return null;
  }

  if (noProcess.length > 0) {
    alert(`Exported ${sheetCount} process sheet${sheetCount!==1?'s':''}. Note: ${noProcess.length} bucket${noProcess.length!==1?'s were':' was'} skipped (no process selected).`);
  }

  // Build INDEX sheet and prepend it as the first tab so opening the file
  // immediately shows what processes are inside without hunting through tabs.
  const now = new Date();
  const p2 = n => String(n).padStart(2,'0');
  const nowStr = `${p2(now.getMonth()+1)}/${p2(now.getDate())}/${now.getFullYear()} ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  const indexAoa = [
    ['TAG Manufacturing — CI Time Study Export'],
    [],
    ['Export Date:', nowStr],
    ['Plant(s):', [...plantTagsUsed].join(', ')],
    ['Total Process Sheets:', sheetCount],
    [],
    ['Process', 'Sheet Tab', '# Buckets', 'Dates Covered'],
  ];
  Object.values(byGroup).forEach(g => {
    const plantTag = g.plant === 'Plant 2' ? `P2_${(g.stream||'').replace(/ /g,'')}` : 'P1';
    let sheetName = g.process;
    if (processCounts[g.process] > 1) sheetName = `${g.process} (${plantTag})`;
    const dates = g.buckets.map(b => b.startTs).sort((a,b) => a-b);
    const d1 = formatExportDate(dates[0]);
    const d2 = formatExportDate(dates[dates.length - 1]);
    const dateRange = d1 === d2 ? d1 : `${d1} – ${d2}`;
    indexAoa.push([g.process, sheetName.slice(0,31), g.buckets.length, dateRange]);
  });
  indexAoa.push([]);
  indexAoa.push(['NOTE: Use the sheet tabs at the bottom of this window to view each process.']);
  const wsIndex = XLSX.utils.aoa_to_sheet(indexAoa);
  wsIndex['!cols'] = [{ wch: 28 }, { wch: 32 }, { wch: 12 }, { wch: 22 }];
  boldAllCells(wsIndex);
  // Prepend: insert at position 0 in the workbook
  wb.SheetNames.unshift('Summary');
  wb.Sheets['Summary'] = wsIndex;

  // Build "Bucket Detail" sheet — one section per bucket: heading + every element
  const detailAoa = [];
  exported.forEach((b, bi) => {
    if (bi > 0) detailAoa.push([], []); // blank rows between buckets
    const h = b.header || {};
    const els = b.elements || [];
    const cycleSec = els.filter(e => e.tier==='green'||e.tier==='amber').reduce((s,e)=>s+e.durationSec,0);
    const vaSec    = els.filter(e=>e.tier==='green').reduce((s,e)=>s+e.durationSec,0);
    const nnvaSec  = els.filter(e=>e.tier==='amber').reduce((s,e)=>s+e.durationSec,0);
    const wasteSec = els.filter(e=>e.tier==='red'&&e.name!==PAUSE_ELEMENT_NAME).reduce((s,e)=>s+e.durationSec,0);
    const pauseSec = els.filter(e=>e.name===PAUSE_ELEMENT_NAME).reduce((s,e)=>s+e.durationSec,0);
    const posCount = els.filter(e=>e.name==='Positioning Bucket').length;

    // Bucket header block
    detailAoa.push([
      `Bucket ${bi+1}`,
      formatExportDate(b.startTs),
      h.process || '(no process)',
      h.frameNumber ? `Frame #${h.frameNumber}` : '',
      h.frameWidth  ? `Width: ${h.frameWidth}"` : '',
      h.operator    ? `Operator: ${h.operator}` : '',
      b.observerName ? `Timed by: ${b.observerName}` : '',
    ]);
    detailAoa.push(['Element', 'Category', 'Duration', '% of Cycle', 'Notes']);

    els.forEach(el => {
      const cat = el.name === PAUSE_ELEMENT_NAME ? 'Pause'
                : el.tier === 'green' ? 'VA'
                : el.tier === 'amber' ? 'Nec (NNVA)'
                : 'Waste (NVA)';
      const pct = (cycleSec > 0 && (el.tier==='green'||el.tier==='amber'))
        ? `${(el.durationSec/cycleSec*100).toFixed(1)}%` : '';
      detailAoa.push([el.name, cat, formatMS(el.durationSec), pct, el.note||'']);
    });

    // Totals row
    const pctStr = cycleSec > 0
      ? `VA: ${(vaSec/cycleSec*100).toFixed(1)}%  |  Nec: ${(nnvaSec/cycleSec*100).toFixed(1)}%`
      : '';
    detailAoa.push([
      'TOTALS',
      '',
      formatMS(cycleSec),
      pctStr,
      `Waste: ${formatMS(wasteSec)}${pauseSec>0?'  |  Pause: '+formatMS(pauseSec):''}`,
    ]);
    if (posCount > 0) {
      const posTotalSec = els.filter(e=>e.name==='Positioning Bucket').reduce((s,e)=>s+e.durationSec,0);
      detailAoa.push(['POSITIONING', `${posCount}x`, formatMS(posTotalSec), '', '']);
    }
  });

  const wsDetail = XLSX.utils.aoa_to_sheet(detailAoa);
  wsDetail['!cols'] = [{wch:30},{wch:13},{wch:10},{wch:26},{wch:50}];
  boldAllCells(wsDetail);
  XLSX.utils.book_append_sheet(wb, wsDetail, 'Bucket Detail');

  // Filename includes a per-second timestamp so repeated exports in the same day
  // NEVER collide and silently overwrite a prior download.
  const plantTagsArr = [...plantTagsUsed];
  const uniqueProcs  = [...new Set(Object.values(byGroup).map(g => g.process))];
  let fileLabel;
  if (uniqueProcs.length === 1 && plantTagsArr.length === 1) {
    const procSlug = uniqueProcs[0].replace(/[^A-Za-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    fileLabel = `${procSlug}_${plantTagsArr[0]}`;
  } else {
    fileLabel = 'Mixed';
  }
  const fd = `${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}`;
  const ft = `${p2(now.getHours())}${p2(now.getMinutes())}${p2(now.getSeconds())}`;
  XLSX.writeFile(wb, `TAG_TimeStudy_${fileLabel}_${fd}_${ft}.xlsx`, { cellStyles: true });
  return exported;
}

/* ── Share (Web Share API — sends .xlsx as email attachment via OS share sheet) ── */
async function shareExportBuckets(buckets) {
  if (typeof XLSX === 'undefined') { alert('Export library not loaded. Connect to internet once to cache it, then retry.'); return null; }
  if (!buckets || !buckets.length) { alert('No buckets to share.'); return null; }

  // Build the same workbook runExportBuckets would produce, but capture it as a blob
  // instead of triggering a download. We do this by running the full export logic and
  // intercepting at the write step.
  const now = new Date();
  const p2 = n => String(n).padStart(2,'0');
  const byGroup = {};
  const noProcess = [];
  const exported = [];
  buckets.forEach(b => {
    const p = b.header && b.header.process;
    if (!p) { noProcess.push(b); return; }
    const plant  = b.plant  || state.plant;
    const stream = b.stream || state.stream;
    const key = `${plant}||${stream}||${p}`;
    (byGroup[key] = byGroup[key] || { plant, stream, process: p, buckets: [] }).buckets.push(b);
    exported.push(b);
  });

  const processCounts = {};
  Object.values(byGroup).forEach(g => { processCounts[g.process] = (processCounts[g.process]||0) + 1; });

  const wb = XLSX.utils.book_new();
  let sheetCount = 0;
  const plantTagsUsed = new Set();
  Object.values(byGroup).forEach(g => {
    const plantTag = g.plant === 'Plant 2' ? `P2_${(g.stream||'').replace(/ /g,'')}` : 'P1';
    plantTagsUsed.add(plantTag);
    const cols = getColumnsForProcess(g.process, g.plant, g.stream);
    const rows = g.buckets.map(b => buildExportRow(b));
    const aoa  = [cols.map(c=>c[0]), ...rows.map(r=>cols.map(c=>c[1](r)))];
    const ws   = XLSX.utils.aoa_to_sheet(aoa);
    autoFitColumns(ws, aoa);
    styleProcessSheet(ws, cols, rows.length, g.plant);
    let sheetName = g.process;
    if (processCounts[g.process] > 1) sheetName = `${g.process} (${plantTag})`;
    XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0,31));
    sheetCount++;
  });

  if (sheetCount === 0) {
    alert(`${noProcess.length} bucket${noProcess.length!==1?'s have':' has'} no process selected. Open the DETAILS panel and pick a process before sharing.`);
    return null;
  }
  if (noProcess.length > 0) {
    alert(`Sharing ${sheetCount} process sheet${sheetCount!==1?'s':''}. Note: ${noProcess.length} bucket${noProcess.length!==1?'s were':' was'} skipped (no process selected).`);
  }

  // Build Summary + Bucket Detail sheets (identical logic to runExportBuckets)
  const nowStr = `${p2(now.getMonth()+1)}/${p2(now.getDate())}/${now.getFullYear()} ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  const indexAoa = [
    ['TAG Manufacturing — CI Time Study Export'], [],
    ['Export Date:', nowStr],
    ['Plant(s):', [...plantTagsUsed].join(', ')],
    ['Total Process Sheets:', sheetCount], [],
    ['Process', 'Sheet Tab', '# Buckets', 'Dates Covered'],
  ];
  Object.values(byGroup).forEach(g => {
    const plantTag = g.plant === 'Plant 2' ? `P2_${(g.stream||'').replace(/ /g,'')}` : 'P1';
    let sheetName = g.process;
    if (processCounts[g.process] > 1) sheetName = `${g.process} (${plantTag})`;
    const dates = g.buckets.map(b => b.startTs).sort((a,b) => a-b);
    const d1 = formatExportDate(dates[0]);
    const d2 = formatExportDate(dates[dates.length-1]);
    indexAoa.push([g.process, sheetName.slice(0,31), g.buckets.length, d1===d2?d1:`${d1} – ${d2}`]);
  });
  indexAoa.push([], ['NOTE: Use the sheet tabs at the bottom of this window to view each process.']);
  const wsIndex = XLSX.utils.aoa_to_sheet(indexAoa);
  wsIndex['!cols'] = [{wch:28},{wch:32},{wch:12},{wch:22}];
  boldAllCells(wsIndex);
  wb.SheetNames.unshift('Summary');
  wb.Sheets['Summary'] = wsIndex;

  const detailAoa = [];
  exported.forEach((b, bi) => {
    if (bi > 0) detailAoa.push([], []);
    const h = b.header || {};
    const els = b.elements || [];
    const cycleSec = els.filter(e=>e.tier==='green'||e.tier==='amber').reduce((s,e)=>s+e.durationSec,0);
    const vaSec    = els.filter(e=>e.tier==='green').reduce((s,e)=>s+e.durationSec,0);
    const nnvaSec  = els.filter(e=>e.tier==='amber').reduce((s,e)=>s+e.durationSec,0);
    const wasteSec = els.filter(e=>e.tier==='red'&&e.name!==PAUSE_ELEMENT_NAME).reduce((s,e)=>s+e.durationSec,0);
    const pauseSec = els.filter(e=>e.name===PAUSE_ELEMENT_NAME).reduce((s,e)=>s+e.durationSec,0);
    const posCount = els.filter(e=>e.name==='Positioning Bucket').length;
    detailAoa.push([`Bucket ${bi+1}`,formatExportDate(b.startTs),h.process||'(no process)',h.frameNumber?`Frame #${h.frameNumber}`:'',h.frameWidth?`Width: ${h.frameWidth}"`:'',h.operator?`Operator: ${h.operator}`:'',b.observerName?`Timed by: ${b.observerName}`:'']);
    detailAoa.push(['Element','Category','Duration','% of Cycle','Notes']);
    els.forEach(el => {
      const cat = el.name===PAUSE_ELEMENT_NAME?'Pause':el.tier==='green'?'VA':el.tier==='amber'?'Nec (NNVA)':'Waste (NVA)';
      const pct = (cycleSec>0&&(el.tier==='green'||el.tier==='amber'))?`${(el.durationSec/cycleSec*100).toFixed(1)}%`:'';
      detailAoa.push([el.name,cat,formatMS(el.durationSec),pct,el.note||'']);
    });
    const pctStr = cycleSec>0?`VA: ${(vaSec/cycleSec*100).toFixed(1)}%  |  Nec: ${(nnvaSec/cycleSec*100).toFixed(1)}%`:'';
    detailAoa.push(['TOTALS','',formatMS(cycleSec),pctStr,`Waste: ${formatMS(wasteSec)}${pauseSec>0?'  |  Pause: '+formatMS(pauseSec):''}`]);
    if (posCount>0) { const posTotalSec=els.filter(e=>e.name==='Positioning Bucket').reduce((s,e)=>s+e.durationSec,0); detailAoa.push(['POSITIONING',`${posCount}x`,formatMS(posTotalSec),'','']); }
  });
  const wsDetail = XLSX.utils.aoa_to_sheet(detailAoa);
  wsDetail['!cols'] = [{wch:30},{wch:13},{wch:10},{wch:26},{wch:50}];
  boldAllCells(wsDetail);
  XLSX.utils.book_append_sheet(wb, wsDetail, 'Bucket Detail');

  // Build filename
  const plantTagsArr = [...plantTagsUsed];
  const uniqueProcs  = [...new Set(Object.values(byGroup).map(g=>g.process))];
  let fileLabel;
  if (uniqueProcs.length===1&&plantTagsArr.length===1) {
    fileLabel = `${uniqueProcs[0].replace(/[^A-Za-z0-9]+/g,'_').replace(/^_+|_+$/g,'')}_${plantTagsArr[0]}`;
  } else { fileLabel = 'Mixed'; }
  const fd = `${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}`;
  const ft = `${p2(now.getHours())}${p2(now.getMinutes())}${p2(now.getSeconds())}`;
  const filename = `TAG_TimeStudy_${fileLabel}_${fd}_${ft}.xlsx`;

  // Build human-readable email subject and body
  const dateStr = `${p2(now.getMonth()+1)}/${p2(now.getDate())}/${now.getFullYear()}`;
  const procLabel = uniqueProcs.length === 1
    ? `${uniqueProcs[0]} (${plantTagsArr[0]})`
    : `Mixed Export (${plantTagsArr.join(', ')})`;
  const emailSubject = `TAG Time Study — ${procLabel} — ${dateStr}`;
  const bucketSummary = Object.values(byGroup).map(g => {
    const plantTag = g.plant === 'Plant 2' ? `P2_${(g.stream||'').replace(/ /g,'')}` : 'P1';
    return `${g.process} (${plantTag}): ${g.buckets.length} bucket${g.buckets.length!==1?'s':''}`;
  }).join('\n');
  const emailBody = `CI Time Study export attached.\n\nProcess${uniqueProcs.length!==1?'es':''}:\n${bucketSummary}\n\nExported: ${nowStr}`;

  // Try Web Share API with file attachment (works on Android/iOS/iPadOS)
  const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array', cellStyles: true });
  const file = new File([buf], filename, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: emailSubject, text: emailBody });
      // Share succeeded — fall through to return exported
    } catch(e) {
      if (e.name === 'AbortError') {
        // User dismissed the share sheet — do NOT mark buckets as exported
        return null;
      }
      // Any other error: fall back to download so data is not lost
      XLSX.writeFile(wb, filename, { cellStyles: true });
    }
  } else {
    // Desktop or browser without file-share support — download instead
    XLSX.writeFile(wb, filename, { cellStyles: true });
  }
  return exported;
}

/* ── Service Worker ── */
let swRegistration = null;
function setUpdateBtn(text, disabled) {
  const btn = document.getElementById('btn-check-update');
  btn.textContent = text; btn.disabled = !!disabled;
}
async function checkForUpdate() {
  if (!swRegistration) { setUpdateBtn('No update service',true); setTimeout(()=>setUpdateBtn('Check for Update',false),2500); return; }
  setUpdateBtn('Checking…',true);
  try {
    await swRegistration.update();
    if (swRegistration.waiting) { setUpdateBtn('Reloading…',true); swRegistration.waiting.postMessage({type:'SKIP_WAITING'}); }
    else { setUpdateBtn('Already up to date ✓',true); setTimeout(()=>setUpdateBtn('Check for Update',false),2500); }
  } catch(e) { setUpdateBtn('Check failed (offline?)',true); setTimeout(()=>setUpdateBtn('Check for Update',false),2500); }
}
document.getElementById('btn-check-update').addEventListener('click', checkForUpdate);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      swRegistration = reg;
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w.addEventListener('statechange', () => {
          if (w.state==='installed' && navigator.serviceWorker.controller) setUpdateBtn('Update ready — tap to reload',false);
        });
      });
    }).catch(e => console.warn('SW failed:',e));
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
  });
}

/* ── Init ── */
// If an element was still timing when the app last closed (service-worker
// update reload, tablet backgrounding/killing the tab, a crash), SEAL it
// into its bucket with the elapsed time instead of silently discarding it.
// Recorded data must never be destroyed on reload — if the elapsed time
// looks too long (tablet sat overnight, etc.) the operator is warned and
// can edit/delete that one element from the Log, but nothing vanishes
// without them knowing.
if (state.activeElement) {
  const wasTiming = state.activeElement.name;
  const startedAt = state.activeElement.startTs;
  stopActiveElement(Date.now());
  saveState();
  const gapMin = Math.round((Date.now() - startedAt) / 60000);
  if (gapMin >= 10) {
    setTimeout(() => alert(`"${wasTiming}" was still timing when the app reopened (started ${gapMin} min ago) and has been recorded as ending just now. Check that entry in the Log and edit/delete it if the duration looks wrong.`), 300);
  }
}

// Resume wherever the session actually was — losing your place after a
// forced reload (e.g. an app update) shouldn't mean re-picking plant and
// stream from scratch every time.
if (!state.plant) {
  showScreen('screen-plant-select');
} else if (state.plant === 'Plant 2' && !state.stream) {
  showScreen('screen-stream-select');
} else {
  goToSessionHome();
}
updateStatusBar();
</script>
